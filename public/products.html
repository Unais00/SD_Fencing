<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Bestfence | VNC Group</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="products-page">
    <header class="jf-header">
        <div class="header-container">
            <div class="logo">
                <div class="logo-circle">JF</div>
                <span class="logo-text">JUST<span>FENCE</span></span>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/products.html" class="active">View Our Fences</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Our Branches</a></li>
                    <li><a href="#">Contact Us</a></li>
                </ul>
            </nav>
            <div class="header-cta">
                <a href="tel:18005993939" class="btn-call"><i class="fas fa-phone-alt"></i> Call Now</a>
            </div>
        </div>
    </header>

    <div class="page-hero">
        <div class="container text-center">
            <h1 style="color: #fff; font-size: 3.5rem; font-weight: 800;">Our Products</h1>
        </div>
    </div>

    <main class="main-content">
        <div class="products-section">
            <div class="breadcrumb">
                Home / <span>Products</span>
            </div>

            <div class="product-controls">
                <span>Show: 9 / 24 / 36</span>
                <div class="view-icons">
                    <i class="fas fa-th-large"></i>
                    <i class="fas fa-list"></i>
                    <i class="fas fa-th"></i>
                </div>
            </div>

            <div class="product-grid" id="product-grid">
                <!-- Data will be populated here -->
            </div>
        </div>

        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>Categories</h3>
                <ul class="category-list">
                    <li><a href="#">Concrete Mix</a></li>
                    <li><a href="#">Fence Post</a></li>
                    <li><a href="#">Fences</a></li>
                </ul>
            </div>

            <div class="sidebar-section">
                <h3>Products</h3>
                <div class="featured-list">
                    <div class="featured-product">
                        <img src="https://via.placeholder.com/50" alt="Postfix">
                        <span>Postfix</span>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
